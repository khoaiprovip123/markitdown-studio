name: Build and Release Windows App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller flask easyocr pypdfium2 static-ffmpeg pydub SpeechRecognition requests numpy pillow pywebview

    - name: Install local package
      run: |
        pip install -e packages/markitdown

    - name: Run PyInstaller Build
      run: |
        pyinstaller MarkItDownStudio.spec

    - name: Package Dist (Create Zip)
      run: |
        powershell Compress-Archive -Path dist/MarkItDownStudio -DestinationPath dist/MarkItDownStudio.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/MarkItDownStudio.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
