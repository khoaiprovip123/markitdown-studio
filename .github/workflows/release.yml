name: Build and Release Windows App

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller flask easyocr pypdfium2 static-ffmpeg pydub SpeechRecognition requests numpy pillow pywebview

    - name: Install local package
      run: |
        pip install -e packages/markitdown

    - name: Update Version with Build Number
      shell: powershell
      run: |
        $run_number = "${{ github.run_number }}"
        $content = Get-Content app.py
        $new_content = $content -replace 'VERSION\s*=\s*"([^"]+)"', "VERSION = `"`$1.$run_number`""
        $new_content | Set-Content app.py
        Write-Host "Updated app.py version to: " ($new_content | Select-String -Pattern 'VERSION\s*=\s*"([^"]+)"').Matches.Groups[1].Value

    - name: Run PyInstaller Build
      run: |
        pyinstaller MarkItDownStudio.spec

    - name: Get Version from App
      id: get_version
      shell: powershell
      run: |
        $version = (Get-Content app.py | Select-String -Pattern 'VERSION\s*=\s*"([^"]+)"').Matches.Groups[1].Value
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT

    - name: Package Dist (Create Setup Installer)
      shell: powershell
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion="${{ steps.get_version.outputs.VERSION }}" installer.iss

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.get_version.outputs.VERSION }}
        name: "MarkItDown Studio v${{ steps.get_version.outputs.VERSION }} (Build #${{ github.run_number }})"
        files: |
          dist/MarkItDownStudioSetup.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
